<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>체육관 물품 관리</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (JSX 컴파일러) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 기본 폰트 및 모바일 터치 하이라이트 제거 */
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-gray-100">
  
  <!-- React 앱이 표시될 공간 -->
  <div id="root"></div>

  <!-- React 코드 작성 영역 (Firebase 모듈 import를 위해 data-type="module" 사용) -->
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo } = React;

    // --- Firebase 모듈 Import (CDN 사용) ---
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, serverTimestamp, deleteDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    // --- Icon Components (내장 SVG로 완전 교체) ---
    const Icon = ({ name, size = 24, className = '', strokeWidth = 2 }) => {
      const paths = {
        Check: <polyline points="20 6 9 17 4 12" />,
        ChevronLeft: <polyline points="15 18 9 12 15 6" />,
        Minus: <line x1="5" y1="12" x2="19" y2="12" />,
        Plus: <><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></>,
        ShoppingBag: <><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" /><line x1="3" y1="6" x2="21" y2="6" /><path d="M16 10a4 4 0 0 1-8 0" /></>,
        User: <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></>,
        CheckCircle2: <><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></>,
        Package: <><line x1="16.5" y1="9.4" x2="7.5" y2="4.21" /><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" /><polyline points="3.27 6.96 12 12.01 20.73 6.96" /><line x1="12" y1="22.08" x2="12" y2="12" /></>,
        History: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><polyline points="3 3 3 8 8 8" /><polyline points="12 7 12 12 15 15" /></>,
        Settings: <><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></>,
        PlusCircle: <><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="16" /><line x1="8" y1="12" x2="16" y2="12" /></>,
        Trash2: <><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></>,
        List: <><line x1="8" y1="6" x2="21" y2="6" /><line x1="8" y1="12" x2="21" y2="12" /><line x1="8" y1="18" x2="21" y2="18" /><line x1="3" y1="6" x2="3.01" y2="6" /><line x1="3" y1="12" x2="3.01" y2="12" /><line x1="3" y1="18" x2="3.01" y2="18" /></>,
        Camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" /><circle cx="12" cy="13" r="3" /></>,
        Lock: <><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
        Edit2: <><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" /></>
      };
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
          {paths[name]}
        </svg>
      );
    };

    const Check = (p) => <Icon name="Check" {...p}/>;
    const ChevronLeft = (p) => <Icon name="ChevronLeft" {...p}/>;
    const Minus = (p) => <Icon name="Minus" {...p}/>;
    const Plus = (p) => <Icon name="Plus" {...p}/>;
    const ShoppingBag = (p) => <Icon name="ShoppingBag" {...p}/>;
    const User = (p) => <Icon name="User" {...p}/>;
    const CheckCircle2 = (p) => <Icon name="CheckCircle2" {...p}/>;
    const Package = (p) => <Icon name="Package" {...p}/>;
    const History = (p) => <Icon name="History" {...p}/>;
    const Settings = (p) => <Icon name="Settings" {...p}/>;
    const PlusCircle = (p) => <Icon name="PlusCircle" {...p}/>;
    const Trash2 = (p) => <Icon name="Trash2" {...p}/>;
    const List = (p) => <Icon name="List" {...p}/>;
    const Camera = (p) => <Icon name="Camera" {...p}/>;
    const Lock = (p) => <Icon name="Lock" {...p}/>;
    const Edit2 = (p) => <Icon name="Edit2" {...p}/>;

    // --- Firebase Initialization ---
    const firebaseConfig = {
      apiKey: "AIzaSyA7UWJVLJ8cmbNdPagEC9FrpUAIb4zPY48",
      authDomain: "schoolgymmanager.firebaseapp.com",
      projectId: "schoolgymmanager",
      storageBucket: "schoolgymmanager.firebasestorage.app",
      messagingSenderId: "518385351559",
      appId: "1:518385351559:web:e3ea5fd7fcde209a343122"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const getEquipmentsRef = () => collection(db, 'equipments');
    const getTransactionsRef = () => collection(db, 'transactions');

    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      
      // Data States
      const [equipments, setEquipments] = useState([]);
      const [transactions, setTransactions] = useState([]);
      
      // UI States
      const [view, setView] = useState('home');
      const [successMessage, setSuccessMessage] = useState('');
      
      // Borrow Flow States
      const [selectedItems, setSelectedItems] = useState({});
      const [borrowerType, setBorrowerType] = useState('select');
      const [borrowerGrade, setBorrowerGrade] = useState('1');
      const [borrowerClass, setBorrowerClass] = useState('1');
      const [borrowerManual, setBorrowerManual] = useState('');

      // Return Flow States
      const [selectedTransactions, setSelectedTransactions] = useState([]);

      // Admin States
      const [newEqName, setNewEqName] = useState('');
      const [newEqImage, setNewEqImage] = useState('');
      const [newEqQty, setNewEqQty] = useState(1);
      const [newEqUnit, setNewEqUnit] = useState('개'); // 단위 추가
      const [newEqTracked, setNewEqTracked] = useState(true);
      const [adminPwdInput, setAdminPwdInput] = useState('');
      
      // Edit Equipment States
      const [editingEqId, setEditingEqId] = useState(null);
      const [editEqName, setEditEqName] = useState('');
      const [editEqQty, setEditEqQty] = useState('');
      const [editEqUnit, setEditEqUnit] = useState('개');
      const [sortBy, setSortBy] = useState('latest');
      
      // Image Edit Modal State
      const [imageModal, setImageModal] = useState({ show: false, eqId: null, currentImage: '' });
      
      // Admin Password Management States
      const [actualAdminPwd, setActualAdminPwd] = useState('0000');
      const [newPwdInput, setNewPwdInput] = useState('');
      const [confirmPwdInput, setConfirmPwdInput] = useState('');

      // Custom Modal States
      const [alertState, setAlertState] = useState({ show: false, message: '' });
      const [confirmState, setConfirmState] = useState({ show: false, message: '', onConfirm: null });
      const [toastMsg, setToastMsg] = useState(''); 

      const showAlert = (message) => setAlertState({ show: true, message });
      const showConfirm = (message, onConfirm) => setConfirmState({ show: true, message, onConfirm });
      const showToast = (message) => {
        setToastMsg(message);
        setTimeout(() => setToastMsg(''), 2500);
      };

      // --- 1. Authentication ---
      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (error) {
            console.error('Auth error:', error);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
          if (currentUser) setLoading(false);
        });
        return () => unsubscribe();
      }, []);

      // --- 2. Data Fetching & Seeding ---
      useEffect(() => {
        if (!user) return;

        let unsubEquipments;
        let unsubTransactions;
        let unsubAdminConfig;

        try {
          unsubEquipments = onSnapshot(
            getEquipmentsRef(),
            (snapshot) => {
              const eqData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              setEquipments(eqData);
              if (eqData.length === 0 && snapshot.metadata.fromCache === false) {
                seedInitialEquipments();
              }
            },
            (err) => console.error("Equipments fetch error:", err)
          );

          unsubTransactions = onSnapshot(
            getTransactionsRef(),
            (snapshot) => {
              setTransactions(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            },
            (err) => console.error("Transactions fetch error:", err)
          );

          unsubAdminConfig = onSnapshot(
            doc(db, 'config', 'admin'),
            (docSnap) => {
              if (docSnap.exists() && docSnap.data().password) {
                setActualAdminPwd(docSnap.data().password);
              }
            },
            (err) => console.error("Admin config fetch error:", err)
          );
        } catch (error) {
          console.error("Firestore subscription error:", error);
        }

        return () => {
          if (unsubEquipments) unsubEquipments();
          if (unsubTransactions) unsubTransactions();
          if (unsubAdminConfig) unsubAdminConfig();
        };
      }, [user]);

      const seedInitialEquipments = async () => {
        const initialData = [
          { name: '농구공', imageUrl: '🏀', totalQuantity: 15, isQuantityTracked: true, unit: '개' },
          { name: '축구공', imageUrl: '⚽', totalQuantity: 12, isQuantityTracked: true, unit: '개' },
          { name: '배구공', imageUrl: '🏐', totalQuantity: 10, isQuantityTracked: true, unit: '개' },
          { name: '뜀틀 세트', imageUrl: '🤸', totalQuantity: 2, isQuantityTracked: false, unit: '세트' },
          { name: '줄넘기', imageUrl: '➰', totalQuantity: 30, isQuantityTracked: true, unit: '개' },
          { name: '팀 조끼', imageUrl: '🎽', totalQuantity: 4, isQuantityTracked: true, unit: '세트' }
        ];
        for (const item of initialData) {
          await addDoc(getEquipmentsRef(), { ...item, createdAt: serverTimestamp() });
        }
      };

      // --- 3. Derived State & Helpers ---
      const activeTransactions = useMemo(() => {
        return transactions.filter(t => t.status === 'borrowed').sort((a, b) => b.timestamp - a.timestamp);
      }, [transactions]);

      const sortedEquipments = useMemo(() => {
        return [...equipments].sort((a, b) => {
          if (sortBy === 'name') {
            return a.name.localeCompare(b.name);
          } else if (sortBy === 'oldest') {
            const timeA = a.createdAt?.toMillis ? a.createdAt.toMillis() : 0;
            const timeB = b.createdAt?.toMillis ? b.createdAt.toMillis() : 0;
            return timeA - timeB;
          } else {
            const timeA = a.createdAt?.toMillis ? a.createdAt.toMillis() : 0;
            const timeB = b.createdAt?.toMillis ? b.createdAt.toMillis() : 0;
            return timeB - timeA;
          }
        });
      }, [equipments, sortBy]);

      const getAvailableQuantity = (equipmentId) => {
        const eq = equipments.find(e => e.id === equipmentId);
        if (!eq) return 0;
        
        const borrowedCount = activeTransactions
          .filter(t => t.equipmentId === equipmentId)
          .reduce((sum, t) => sum + t.borrowedQuantity, 0);
          
        return eq.totalQuantity - borrowedCount;
      };

      const handleImageChange = (e, setterFunc) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_SIZE = 200;
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > MAX_SIZE) {
                height *= MAX_SIZE / width;
                width = MAX_SIZE;
              }
            } else {
              if (height > MAX_SIZE) {
                width *= MAX_SIZE / height;
                height = MAX_SIZE;
              }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
            setterFunc(dataUrl);
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      const renderIcon = (url, name) => {
        if (!url) return <span className="text-gray-400">📦</span>;
        if (url.startsWith('http') || url.startsWith('data:')) {
          return <img src={url} alt={name} className="w-full h-full object-contain drop-shadow-sm rounded-md" />;
        }
        return <span>{url}</span>;
      };

      // --- 4. Handlers ---
      const handleBorrowSubmit = async () => {
        let finalBorrowerName = '';
        if (borrowerType === 'select') {
          finalBorrowerName = `${borrowerGrade}학년 ${borrowerClass}반`;
        } else {
          if (!borrowerManual.trim()) return showAlert('이름을 입력해주세요.');
          finalBorrowerName = borrowerManual.trim();
        }

        try {
          setLoading(true);
          const promises = Object.entries(selectedItems).map(([eqId, qty]) => {
            if (qty > 0) {
              return addDoc(getTransactionsRef(), {
                equipmentId: eqId,
                borrowerName: finalBorrowerName,
                borrowedQuantity: qty,
                status: 'borrowed',
                timestamp: serverTimestamp()
              });
            }
            return Promise.resolve();
          });
          
          await Promise.all(promises);
          
          setSelectedItems({});
          setBorrowerManual('');
          showSuccess('대여가 완료되었습니다!');
        } catch (error) {
          console.error("Borrow error:", error);
          showAlert('대여 처리 중 오류가 발생했습니다.');
        } finally {
          setLoading(false);
        }
      };

      const handleReturnSubmit = async () => {
        try {
          setLoading(true);
          const promises = selectedTransactions.map(txId => {
            const txRef = doc(db, 'transactions', txId);
            return updateDoc(txRef, {
              status: 'returned',
              returnTimestamp: serverTimestamp()
            });
          });

          await Promise.all(promises);
          
          setSelectedTransactions([]);
          showSuccess('반납이 완료되었습니다!');
        } catch (error) {
          console.error("Return error:", error);
          showAlert('반납 처리 중 오류가 발생했습니다.');
        } finally {
          setLoading(false);
        }
      };

      const handleAddEquipment = async () => {
        if (!newEqName.trim()) return showAlert('물품 이름을 입력해주세요.');
        try {
          setLoading(true);
          await addDoc(getEquipmentsRef(), {
            name: newEqName.trim(),
            imageUrl: newEqImage || '📦',
            totalQuantity: Number(newEqQty),
            unit: newEqUnit,
            isQuantityTracked: newEqTracked,
            createdAt: serverTimestamp()
          });
          setNewEqName('');
          setNewEqImage('');
          setNewEqQty(1);
          setNewEqUnit('개');
          showToast('새 물품이 추가되었습니다!'); 
        } catch (error) {
          console.error("Add equipment error:", error);
          showAlert('물품 추가 중 오류가 발생했습니다.');
        } finally {
          setLoading(false);
        }
      };

      const handleDeleteEquipment = (id) => {
        showConfirm('정말 이 물품을 삭제하시겠습니까? 관련 대여 기록에서 물품 정보가 표시되지 않을 수 있습니다.', async () => {
          try {
            setLoading(true);
            await deleteDoc(doc(db, 'equipments', id));
            showToast('물품이 삭제되었습니다.'); 
          } catch (error) {
            console.error("Delete error:", error);
            showAlert('물품 삭제 중 오류가 발생했습니다.');
          } finally {
            setLoading(false);
          }
        });
      };

      const handleUpdateEquipment = async (id) => {
        if (!editEqName.trim()) return showAlert('물품 이름을 입력해주세요.');
        if (Number(editEqQty) < 1) return showAlert('수량은 1 이상이어야 합니다.');
        try {
          setLoading(true);
          await updateDoc(doc(db, 'equipments', id), {
            name: editEqName.trim(),
            totalQuantity: Number(editEqQty),
            unit: editEqUnit
          });
          showToast('물품 정보가 수정되었습니다.');
          setEditingEqId(null);
        } catch (error) {
          console.error("Update error:", error);
          showAlert('정보 수정 중 오류가 발생했습니다.');
        } finally {
          setLoading(false);
        }
      };

      const handleDeleteTransaction = (id) => {
        showConfirm('이 대여/반납 기록을 정말 삭제하시겠습니까? 삭제된 기록은 복구할 수 없습니다.', async () => {
          try {
            setLoading(true);
            await deleteDoc(doc(db, 'transactions', id));
            showToast('기록이 삭제되었습니다.');
          } catch (error) {
            console.error("Delete transaction error:", error);
            showAlert('기록 삭제 중 오류가 발생했습니다.');
          } finally {
            setLoading(false);
          }
        });
      };

      const handleChangePassword = async () => {
        if (!newPwdInput) return showAlert('새 비밀번호를 입력해주세요.');
        if (newPwdInput !== confirmPwdInput) return showAlert('비밀번호가 일치하지 않습니다.');
        
        try {
          setLoading(true);
          await setDoc(doc(db, 'config', 'admin'), { password: newPwdInput }, { merge: true });
          showToast('비밀번호가 변경되었습니다!'); 
          setNewPwdInput('');
          setConfirmPwdInput('');
        } catch (error) {
          console.error("Password change error:", error);
          showAlert('비밀번호 변경 중 오류가 발생했습니다.');
        } finally {
          setLoading(false);
        }
      };

      const showSuccess = (msg) => {
        setSuccessMessage(msg);
        setView('success');
        setTimeout(() => {
          setView(view.startsWith('admin') ? 'admin_home' : 'home');
          setSuccessMessage('');
        }, 2000);
      };

      // --- 5. UI Components ---

      if (loading && view === 'home') {
        return (
          <div className="flex h-screen items-center justify-center bg-gray-50">
            <div className="animate-spin rounded-full h-12 w-12 border-4 border-green-500 border-t-transparent"></div>
          </div>
        );
      }

      return (
        <div className="max-w-3xl mx-auto min-h-screen bg-gray-50 shadow-2xl overflow-hidden relative font-sans">
          
          {/* Header */}
          {view !== 'home' && view !== 'success' && (
            <header className="bg-white px-4 py-4 flex items-center shadow-sm sticky top-0 z-10">
              <button 
                onClick={() => {
                  if (view === 'borrow_qty') setView('borrow_select');
                  else if (view === 'borrow_user') setView('borrow_qty');
                  else if (view === 'admin_equipments' || view === 'admin_history' || view === 'admin_settings') setView('admin_home');
                  else if (view === 'admin_auth') setView('home');
                  else {
                    setView('home');
                    setSelectedItems({});
                    setSelectedTransactions([]);
                    setAdminPwdInput('');
                  }
                }}
                className="p-2 -ml-2 text-gray-600 hover:bg-gray-100 rounded-full transition-colors"
              >
                <ChevronLeft size={24} />
              </button>
              <h1 className="ml-2 text-lg font-bold text-gray-800">
                {view.startsWith('borrow') ? '물품 대여하기' : 
                 view.startsWith('return') ? '물품 반납하기' :
                 view === 'admin_auth' ? '관리자 인증' :
                 view === 'admin_home' ? '관리자 모드' :
                 view === 'admin_settings' ? '관리자 설정' :
                 view === 'admin_equipments' ? '물품 마스터 관리' :
                 view === 'admin_history' ? '전체 대여 기록' : ''}
              </h1>
            </header>
          )}

          <main className="pb-24">
            {/* --- HOME VIEW --- */}
            {view === 'home' && (
              <div className="flex flex-col h-screen p-6 justify-center relative">
                <div className="text-center mb-10">
                  <h1 className="text-4xl md:text-5xl font-extrabold text-gray-800 tracking-tight">체육관 물품 관리</h1>
                  <p className="text-gray-500 mt-3 md:text-lg">쉽고 빠른 대여/반납 시스템</p>
                </div>
                
                <div className="flex flex-col md:flex-row gap-6 w-full max-w-2xl mx-auto">
                  <button 
                    onClick={() => setView('borrow_select')}
                    className="flex-1 py-12 md:py-16 bg-green-500 hover:bg-green-600 active:scale-95 transition-all rounded-3xl p-6 shadow-lg shadow-green-500/30 flex flex-col items-center justify-center space-y-4 group"
                  >
                    <div className="bg-white/20 p-5 rounded-full group-hover:scale-110 transition-transform">
                      <Package size={56} className="text-white md:w-20 md:h-20" />
                    </div>
                    <span className="text-3xl md:text-4xl font-bold text-white tracking-wide">대여하기</span>
                  </button>

                  <button 
                    onClick={() => setView('return_select')}
                    className="flex-1 py-12 md:py-16 bg-red-500 hover:bg-red-600 active:scale-95 transition-all rounded-3xl p-6 shadow-lg shadow-red-500/30 flex flex-col items-center justify-center space-y-4 group"
                  >
                    <div className="bg-white/20 p-5 rounded-full group-hover:scale-110 transition-transform">
                      <History size={56} className="text-white md:w-20 md:h-20" />
                    </div>
                    <span className="text-3xl md:text-4xl font-bold text-white tracking-wide">반납하기</span>
                  </button>
                </div>

                <button 
                  onClick={() => setView('admin_auth')}
                  className="absolute top-6 right-6 p-3 text-gray-400 hover:text-gray-700 bg-white rounded-full shadow-sm transition-all md:w-14 md:h-14 flex items-center justify-center"
                >
                  <Settings size={26} />
                </button>
              </div>
            )}

            {/* --- ADMIN AUTH VIEW --- */}
            {view === 'admin_auth' && (
              <div className="p-6 flex flex-col items-center justify-center mt-20">
                <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 w-full max-w-sm text-center mx-auto">
                  <div className="bg-gray-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                    <Settings size={40} className="text-gray-400" />
                  </div>
                  <h2 className="text-2xl font-bold text-gray-800 mb-2">관리자 인증</h2>
                  <p className="text-gray-500 text-sm mb-6">비밀번호를 입력해주세요.<br/>(초기 비밀번호: 0000)</p>
                  
                  <input 
                    type="password" 
                    placeholder="비밀번호 입력"
                    value={adminPwdInput}
                    onChange={(e) => setAdminPwdInput(e.target.value)}
                    onKeyDown={(e) => {
                      if (e.key === 'Enter') {
                        if (adminPwdInput === actualAdminPwd) {
                          setView('admin_home');
                          setAdminPwdInput('');
                        } else {
                          showAlert('비밀번호가 일치하지 않습니다.');
                        }
                      }
                    }}
                    className="w-full bg-gray-50 border border-gray-200 text-center text-2xl tracking-widest font-bold rounded-xl p-4 focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none mb-4"
                  />
                  
                  <button 
                    onClick={() => {
                      if (adminPwdInput === actualAdminPwd) {
                        setView('admin_home');
                        setAdminPwdInput('');
                      } else {
                        showAlert('비밀번호가 일치하지 않습니다.');
                      }
                    }}
                    className="w-full bg-gray-800 text-white font-bold text-lg py-4 rounded-xl shadow-lg transition-colors hover:bg-gray-900 active:scale-95"
                  >
                    확인
                  </button>
                </div>
              </div>
            )}

            {/* --- BORROW STEP 1: Select Items --- */}
            {view === 'borrow_select' && (
              <div className="p-4 md:p-6">
                <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-4 px-1 gap-2">
                  <p className="text-sm md:text-base font-medium text-gray-500">대여할 물품을 선택해주세요 (다중 선택 가능)</p>
                  <select 
                    value={sortBy} 
                    onChange={(e) => setSortBy(e.target.value)}
                    className="bg-white border border-gray-200 rounded-lg p-2 text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-green-500 w-full sm:w-auto"
                  >
                    <option value="latest">최신순</option>
                    <option value="oldest">오래된순</option>
                    <option value="name">이름순 (가나다)</option>
                  </select>
                </div>
                <div className="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6">
                  {sortedEquipments.map((eq) => {
                    const available = getAvailableQuantity(eq.id);
                    const isUnavailable = available <= 0;
                    const isSelected = selectedItems[eq.id] > 0;

                    return (
                      <button
                        key={eq.id}
                        disabled={isUnavailable}
                        onClick={() => {
                          setSelectedItems(prev => {
                            const newItems = { ...prev };
                            if (newItems[eq.id]) delete newItems[eq.id];
                            else newItems[eq.id] = 1;
                            return newItems;
                          });
                        }}
                        className={`relative p-4 md:p-6 rounded-2xl flex flex-col items-center justify-center border-2 transition-all ${
                          isUnavailable 
                            ? 'bg-gray-200 border-gray-200 opacity-60 cursor-not-allowed'
                            : isSelected
                              ? 'bg-green-50 border-green-500 shadow-md'
                              : 'bg-white border-transparent shadow-sm hover:shadow-md active:bg-gray-50'
                        }`}
                      >
                        {isSelected && (
                          <div className="absolute top-3 right-3 bg-green-500 text-white rounded-full p-1.5 shadow-sm">
                            <Check size={20} strokeWidth={3} />
                          </div>
                        )}
                        
                        <div className="w-24 h-24 md:w-32 md:h-32 mb-4 flex items-center justify-center text-7xl md:text-8xl">
                          {renderIcon(eq.imageUrl, eq.name)}
                        </div>
                        <h3 className={`font-bold text-lg md:text-xl text-center ${isUnavailable ? 'text-gray-500' : 'text-gray-800'}`}>{eq.name}</h3>
                        <p className={`text-sm md:text-base mt-1 ${isUnavailable ? 'text-gray-400' : 'text-green-600 font-medium'}`}>
                          {isUnavailable ? '대여 불가' : `남은 수량: ${available}${eq.unit || '개'}`}
                        </p>
                      </button>
                    );
                  })}
                </div>
                
                <div className="fixed bottom-0 left-0 right-0 max-w-3xl mx-auto p-4 bg-white/90 backdrop-blur-md border-t border-gray-100 z-10">
                  <button
                    disabled={Object.keys(selectedItems).length === 0}
                    onClick={() => setView('borrow_qty')}
                    className="w-full bg-green-500 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-bold text-lg py-4 rounded-xl shadow-lg transition-colors flex justify-center items-center"
                  >
                    다음 단계로 <ChevronLeft size={20} className="rotate-180 ml-1" />
                  </button>
                </div>
              </div>
            )}

            {/* --- BORROW STEP 2: Adjust Quantity --- */}
            {view === 'borrow_qty' && (
              <div className="p-4 md:p-6 space-y-4 md:space-y-6">
                <p className="text-sm md:text-base font-medium text-gray-500 mb-4 px-1">대여할 수량을 확인 및 조정해주세요</p>
                
                {Object.keys(selectedItems).map(eqId => {
                  const eq = equipments.find(e => e.id === eqId);
                  const available = getAvailableQuantity(eqId);
                  const qty = selectedItems[eqId];

                  return (
                    <div key={eqId} className="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                      <div className="flex items-center space-x-4 md:space-x-6">
                        <div className="w-16 h-16 md:w-20 md:h-20 flex items-center justify-center text-5xl md:text-6xl shrink-0">
                          {renderIcon(eq?.imageUrl, eq?.name)}
                        </div>
                        <div>
                          <h4 className="font-bold text-lg md:text-xl text-gray-800">{eq?.name}</h4>
                          <p className="text-sm text-gray-500 mt-1">최대 {available}{eq?.unit || '개'} 가능</p>
                        </div>
                      </div>

                      {eq?.isQuantityTracked ? (
                        <div className="flex items-center bg-gray-50 rounded-xl p-1 border border-gray-200">
                          <button 
                            onClick={() => setSelectedItems(prev => ({ ...prev, [eqId]: Math.max(1, qty - 1) }))}
                            className="p-3 text-gray-600 hover:bg-white hover:shadow-sm rounded-lg transition-all"
                          >
                            <Minus size={24} />
                          </button>
                          <span className="w-12 text-center font-bold text-xl flex items-center justify-center gap-1">
                            {qty}<span className="text-sm text-gray-500 font-normal">{eq?.unit || '개'}</span>
                          </span>
                          <button 
                            onClick={() => setSelectedItems(prev => ({ ...prev, [eqId]: Math.min(available, qty + 1) }))}
                            className="p-3 text-gray-600 hover:bg-white hover:shadow-sm rounded-lg transition-all"
                          >
                            <Plus size={24} />
                          </button>
                        </div>
                      ) : (
                        <div className="bg-green-50 text-green-700 font-bold px-4 py-2 rounded-lg text-sm border border-green-100">
                          수량 입력 없음 (1{eq?.unit || '개'})
                        </div>
                      )}
                    </div>
                  );
                })}

                <div className="fixed bottom-0 left-0 right-0 max-w-3xl mx-auto p-4 bg-white/90 backdrop-blur-md border-t border-gray-100 z-10">
                  <button
                    onClick={() => setView('borrow_user')}
                    className="w-full bg-green-500 text-white font-bold text-lg py-4 rounded-xl shadow-lg transition-colors flex justify-center items-center"
                  >
                    다음 단계로 <ChevronLeft size={20} className="rotate-180 ml-1" />
                  </button>
                </div>
              </div>
            )}

            {/* --- BORROW STEP 3: Borrower Info --- */}
            {view === 'borrow_user' && (
              <div className="p-4 md:p-6 space-y-6">
                <p className="text-sm md:text-base font-medium text-gray-500 px-1">누가 빌리는지 알려주세요</p>
                
                <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-gray-100">
                  <div className="flex bg-gray-100 p-1 rounded-xl mb-6">
                    <button 
                      onClick={() => setBorrowerType('select')}
                      className={`flex-1 py-3 md:py-4 rounded-lg text-sm md:text-base font-bold transition-all ${borrowerType === 'select' ? 'bg-white shadow-sm text-green-600' : 'text-gray-500'}`}
                    >
                      학년 / 반 선택
                    </button>
                    <button 
                      onClick={() => setBorrowerType('manual')}
                      className={`flex-1 py-3 md:py-4 rounded-lg text-sm md:text-base font-bold transition-all ${borrowerType === 'manual' ? 'bg-white shadow-sm text-green-600' : 'text-gray-500'}`}
                    >
                      직접 입력
                    </button>
                  </div>

                  {borrowerType === 'select' ? (
                    <div className="flex space-x-4">
                      <div className="flex-1">
                        <label className="block text-xs md:text-sm font-bold text-gray-500 mb-2 uppercase tracking-wider">학년 (Grade)</label>
                        <div className="relative">
                          <select 
                            value={borrowerGrade} 
                            onChange={(e) => setBorrowerGrade(e.target.value)}
                            className="w-full appearance-none bg-gray-50 border border-gray-200 text-gray-800 text-lg md:text-xl font-bold rounded-xl p-4 md:p-5 focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none"
                          >
                            {[1,2,3,4,5,6].map(g => <option key={g} value={g}>{g}학년</option>)}
                          </select>
                          <ChevronLeft size={20} className="absolute right-4 top-1/2 -translate-y-1/2 rotate-[-90deg] text-gray-400 pointer-events-none" />
                        </div>
                      </div>
                      <div className="flex-1">
                        <label className="block text-xs md:text-sm font-bold text-gray-500 mb-2 uppercase tracking-wider">반 (Class)</label>
                        <div className="relative">
                          <select 
                            value={borrowerClass} 
                            onChange={(e) => setBorrowerClass(e.target.value)}
                            className="w-full appearance-none bg-gray-50 border border-gray-200 text-gray-800 text-lg md:text-xl font-bold rounded-xl p-4 md:p-5 focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none"
                          >
                            {[1,2,3,4,5,6].map(c => <option key={c} value={c}>{c}반</option>)}
                          </select>
                          <ChevronLeft size={20} className="absolute right-4 top-1/2 -translate-y-1/2 rotate-[-90deg] text-gray-400 pointer-events-none" />
                        </div>
                      </div>
                    </div>
                  ) : (
                    <div>
                      <label className="block text-xs md:text-sm font-bold text-gray-500 mb-2 uppercase tracking-wider">이름 또는 부서 입력</label>
                      <div className="relative">
                        <User className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" size={24} />
                        <input 
                          type="text" 
                          placeholder="예) 홍길동 선생님, 학생회"
                          value={borrowerManual}
                          onChange={(e) => setBorrowerManual(e.target.value)}
                          className="w-full bg-gray-50 border border-gray-200 text-gray-800 text-lg md:text-xl font-bold rounded-xl p-4 md:p-5 pl-12 md:pl-14 focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none"
                        />
                      </div>
                    </div>
                  )}
                </div>

                <div className="bg-green-50 border border-green-100 rounded-2xl p-4 md:p-6 mt-6">
                  <h4 className="text-green-800 font-bold mb-3 flex items-center text-sm md:text-base">
                    <ShoppingBag size={18} className="mr-2" /> 대여 요약
                  </h4>
                  <ul className="space-y-2 text-sm md:text-base text-green-700">
                    {Object.entries(selectedItems).map(([eqId, qty]) => {
                      const eq = equipments.find(e => e.id === eqId);
                      return (
                        <li key={eqId} className="flex justify-between items-center bg-white/60 p-2 rounded-lg">
                          <span className="font-medium">{eq?.name}</span>
                          <span className="font-bold bg-green-100 px-3 py-1 rounded-full">{qty}{eq?.unit || '개'}</span>
                        </li>
                      );
                    })}
                  </ul>
                </div>

                <div className="fixed bottom-0 left-0 right-0 max-w-3xl mx-auto p-4 bg-white/90 backdrop-blur-md border-t border-gray-100 z-10">
                  <button
                    onClick={handleBorrowSubmit}
                    disabled={loading}
                    className="w-full bg-green-500 disabled:bg-gray-400 text-white font-bold text-lg py-4 rounded-xl shadow-lg transition-colors"
                  >
                    {loading ? '처리중...' : '대여 완료하기'}
                  </button>
                </div>
              </div>
            )}

            {/* --- RETURN VIEW --- */}
            {view === 'return_select' && (
              <div className="p-4 md:p-6 space-y-4">
                <p className="text-sm md:text-base font-medium text-gray-500 mb-4 px-1">내가 빌린 물품을 선택해서 반납하세요</p>
                
                {activeTransactions.length === 0 ? (
                  <div className="text-center py-20 bg-white rounded-3xl border border-gray-100 shadow-sm">
                    <div className="bg-gray-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4">
                      <CheckCircle2 size={48} className="text-gray-300" />
                    </div>
                    <h3 className="text-xl font-bold text-gray-600 mb-2">대여 중인 물품이 없습니다</h3>
                    <p className="text-gray-400">모든 물품이 잘 반납되어 있습니다.</p>
                  </div>
                ) : (
                  <div className="space-y-3 md:space-y-4">
                    {activeTransactions.map((tx) => {
                      const eq = equipments.find(e => e.id === tx.equipmentId);
                      const isSelected = selectedTransactions.includes(tx.id);
                      const borrowDate = tx.timestamp ? new Date(tx.timestamp.toDate()).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '방금 전';

                      return (
                        <button
                          key={tx.id}
                          onClick={() => {
                            setSelectedTransactions(prev => 
                              prev.includes(tx.id) ? prev.filter(id => id !== tx.id) : [...prev, tx.id]
                            )
                          }}
                          className={`w-full flex items-center p-4 md:p-5 rounded-2xl border-2 transition-all text-left ${
                            isSelected ? 'bg-red-50 border-red-500 shadow-md' : 'bg-white border-gray-100 shadow-sm hover:border-red-200'
                          }`}
                        >
                          <div className={`w-6 h-6 rounded-full border-2 mr-4 flex items-center justify-center shrink-0 transition-colors ${
                            isSelected ? 'border-red-500 bg-red-500' : 'border-gray-300'
                          }`}>
                            {isSelected && <Check size={14} className="text-white" strokeWidth={3} />}
                          </div>
                          
                          <div className="w-12 h-12 md:w-16 md:h-16 flex items-center justify-center text-3xl md:text-4xl mr-4 shrink-0 bg-gray-50 rounded-xl">
                            {renderIcon(eq?.imageUrl, eq?.name)}
                          </div>
                          
                          <div className="flex-1">
                            <div className="flex justify-between items-start mb-1">
                              <h4 className="font-bold text-lg text-gray-800">{eq?.name || '알 수 없는 물품'}</h4>
                              <span className="font-bold text-red-600 bg-red-100 px-2 py-0.5 rounded text-sm">{tx.borrowedQuantity}{eq?.unit || '개'}</span>
                            </div>
                            <div className="flex items-center text-sm text-gray-500">
                              <User size={14} className="mr-1" /> {tx.borrowerName}
                            </div>
                            <div className="text-xs text-gray-400 mt-1">{borrowDate} 대여함</div>
                          </div>
                        </button>
                      );
                    })}
                  </div>
                )}

                {activeTransactions.length > 0 && (
                  <div className="fixed bottom-0 left-0 right-0 max-w-3xl mx-auto p-4 bg-white/90 backdrop-blur-md border-t border-gray-100 z-10">
                    <button
                      disabled={selectedTransactions.length === 0 || loading}
                      onClick={handleReturnSubmit}
                      className="w-full bg-red-500 disabled:bg-gray-300 text-white font-bold text-lg py-4 rounded-xl shadow-lg transition-colors"
                    >
                      {loading ? '처리중...' : `${selectedTransactions.length}건 반납하기`}
                    </button>
                  </div>
                )}
              </div>
            )}

            {/* --- SUCCESS VIEW --- */}
            {view === 'success' && (
              <div className="flex h-screen flex-col items-center justify-center p-6 bg-green-500 animate-in fade-in duration-500">
                <div className="bg-white rounded-full p-6 mb-6 shadow-2xl animate-bounce">
                  <Check size={80} className="text-green-500" strokeWidth={3} />
                </div>
                <h2 className="text-3xl font-bold text-white mb-2">{successMessage}</h2>
                <p className="text-green-100">잠시 후 메인 화면으로 이동합니다...</p>
              </div>
            )}

            {/* --- ADMIN HOME VIEW --- */}
            {view === 'admin_home' && (
              <div className="p-4 md:p-6 space-y-4">
                <h2 className="text-2xl font-bold text-gray-800 mb-6">관리자 메뉴</h2>
                
                <button 
                  onClick={() => setView('admin_equipments')}
                  className="w-full bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between hover:border-green-300 transition-colors group"
                >
                  <div className="flex items-center">
                    <div className="bg-green-100 p-3 rounded-xl mr-4 group-hover:scale-110 transition-transform">
                      <Package size={28} className="text-green-600" />
                    </div>
                    <div className="text-left">
                      <h3 className="text-lg font-bold text-gray-800">물품 마스터 관리</h3>
                      <p className="text-sm text-gray-500">새 물품 추가, 정보 수정, 목록 정렬</p>
                    </div>
                  </div>
                  <ChevronLeft className="text-gray-400 rotate-180" />
                </button>

                <button 
                  onClick={() => setView('admin_history')}
                  className="w-full bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between hover:border-blue-300 transition-colors group"
                >
                  <div className="flex items-center">
                    <div className="bg-blue-100 p-3 rounded-xl mr-4 group-hover:scale-110 transition-transform">
                      <List size={28} className="text-blue-600" />
                    </div>
                    <div className="text-left">
                      <h3 className="text-lg font-bold text-gray-800">전체 대여 기록</h3>
                      <p className="text-sm text-gray-500">누가 언제 무엇을 빌렸는지 확인</p>
                    </div>
                  </div>
                  <ChevronLeft className="text-gray-400 rotate-180" />
                </button>

                <button 
                  onClick={() => setView('admin_settings')}
                  className="w-full bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between hover:border-gray-400 transition-colors group"
                >
                  <div className="flex items-center">
                    <div className="bg-gray-100 p-3 rounded-xl mr-4 group-hover:scale-110 transition-transform">
                      <Lock size={28} className="text-gray-600" />
                    </div>
                    <div className="text-left">
                      <h3 className="text-lg font-bold text-gray-800">관리자 설정</h3>
                      <p className="text-sm text-gray-500">관리자 비밀번호 변경</p>
                    </div>
                  </div>
                  <ChevronLeft className="text-gray-400 rotate-180" />
                </button>
              </div>
            )}

            {/* --- ADMIN EQUIPMENTS VIEW --- */}
            {view === 'admin_equipments' && (
              <div className="p-4 md:p-6 space-y-8">
                {/* 새 물품 추가 폼 */}
                <div className="bg-white p-5 md:p-6 rounded-2xl border border-gray-100 shadow-sm">
                  <h3 className="text-lg font-bold text-gray-800 mb-6 flex items-center">
                    <PlusCircle size={20} className="mr-2 text-green-500" /> 새 물품 추가하기
                  </h3>
                  
                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm font-bold text-gray-600 mb-1">물품 이름</label>
                      <input 
                        type="text" 
                        value={newEqName}
                        onChange={(e) => setNewEqName(e.target.value)}
                        placeholder="예: 탁구채"
                        className="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 focus:ring-2 focus:ring-green-500 outline-none"
                      />
                    </div>
                    
                    <div>
                      <label className="block text-sm font-bold text-gray-600 mb-1">사진 / 아이콘</label>
                      <div className="flex gap-3">
                        <div className="flex-1 relative">
                          <input 
                            type="text" 
                            value={newEqImage}
                            onChange={(e) => setNewEqImage(e.target.value)}
                            placeholder="이모지 입력 또는 사진 선택"
                            className="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 focus:ring-2 focus:ring-green-500 outline-none"
                          />
                        </div>
                        <label className="cursor-pointer bg-gray-100 hover:bg-gray-200 text-gray-700 flex items-center justify-center px-4 rounded-lg font-medium transition-colors border border-gray-200">
                          <Camera size={20} className="mr-2" /> 사진선택
                          <input type="file" accept="image/*" onChange={(e) => handleImageChange(e, setNewEqImage)} className="hidden" />
                        </label>
                      </div>
                      
                      <div className="mt-2 flex flex-wrap gap-2">
                        {['🏀', '⚽', '🏐', '⚾', '🎾', '🏸', '🏓', '🤸', '🎽', '➰', '🥊', '📦'].map(emoji => (
                          <button
                            key={emoji}
                            type="button"
                            onClick={() => setNewEqImage(emoji)}
                            className="w-10 h-10 flex items-center justify-center bg-gray-100 hover:bg-gray-200 rounded-lg text-2xl transition-colors border border-gray-200"
                          >
                            {emoji}
                          </button>
                        ))}
                      </div>

                      {newEqImage && newEqImage.startsWith('data:image') && (
                        <div className="mt-2 w-16 h-16 rounded-lg border overflow-hidden">
                          <img src={newEqImage} alt="preview" className="w-full h-full object-cover" />
                        </div>
                      )}
                    </div>

                    <div className="flex gap-2">
                      <div className="flex-1">
                        <label className="block text-sm font-bold text-gray-600 mb-1">총 수량</label>
                        <input 
                          type="number" 
                          min="1"
                          value={newEqQty}
                          onChange={(e) => setNewEqQty(e.target.value)}
                          className="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 focus:ring-2 focus:ring-green-500 outline-none"
                        />
                      </div>
                      <div className="w-24">
                        <label className="block text-sm font-bold text-gray-600 mb-1">단위</label>
                        <select 
                          value={newEqUnit} 
                          onChange={(e) => setNewEqUnit(e.target.value)}
                          className="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 focus:ring-2 focus:ring-green-500 outline-none"
                        >
                          <option value="개">개</option>
                          <option value="세트">세트</option>
                        </select>
                      </div>
                    </div>
                    
                    <label className="flex items-center space-x-2 cursor-pointer mt-1">
                      <input 
                        type="checkbox" 
                        checked={newEqTracked}
                        onChange={(e) => setNewEqTracked(e.target.checked)}
                        className="w-5 h-5 rounded text-green-500 focus:ring-green-500"
                      />
                      <span className="text-sm font-bold text-gray-600">수량 조절 기능 사용 (해제 시 무조건 1{newEqUnit})</span>
                    </label>

                    <button 
                      onClick={handleAddEquipment}
                      className="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 rounded-xl mt-4 transition-colors"
                    >
                      목록에 추가하기
                    </button>
                  </div>
                </div>

                <hr className="border-gray-200" />

                {/* 등록된 물품 목록 */}
                <div>
                  <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-4 gap-2">
                    <h3 className="text-lg font-bold text-gray-800 flex items-center">
                      <Package size={20} className="mr-2" /> 등록된 물품 목록
                    </h3>
                    <select 
                      value={sortBy} 
                      onChange={(e) => setSortBy(e.target.value)}
                      className="bg-white border border-gray-200 rounded-lg p-2 text-sm text-gray-600 focus:outline-none focus:ring-2 focus:ring-green-500 w-full sm:w-auto"
                    >
                      <option value="latest">최신순</option>
                      <option value="oldest">오래된순</option>
                      <option value="name">이름순 (가나다)</option>
                    </select>
                  </div>
                  
                  <div className="space-y-3">
                    {sortedEquipments.map(eq => (
                      <div key={eq.id} className="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        
                        {/* 편집 모드일 때 */}
                        {editingEqId === eq.id ? (
                          <div className="flex flex-col gap-3 w-full bg-gray-50 p-4 rounded-lg border border-gray-200">
                            <div>
                              <label className="block text-xs font-bold text-gray-500 mb-1">물품 이름</label>
                              <input type="text" value={editEqName} onChange={e => setEditEqName(e.target.value)} className="w-full border border-gray-300 rounded p-2 text-sm focus:border-green-500 outline-none" />
                            </div>
                            <div className="flex gap-2">
                              <div className="flex-1">
                                <label className="block text-xs font-bold text-gray-500 mb-1">총 수량</label>
                                <input type="number" min="1" value={editEqQty} onChange={e => setEditEqQty(e.target.value)} className="w-full border border-gray-300 rounded p-2 text-sm focus:border-green-500 outline-none" />
                              </div>
                              <div className="w-24">
                                <label className="block text-xs font-bold text-gray-500 mb-1">단위</label>
                                <select value={editEqUnit} onChange={e => setEditEqUnit(e.target.value)} className="w-full border border-gray-300 rounded p-2 text-sm focus:border-green-500 outline-none">
                                  <option value="개">개</option>
                                  <option value="세트">세트</option>
                                </select>
                              </div>
                            </div>
                            <div className="flex justify-end gap-2 mt-2">
                              <button onClick={() => setEditingEqId(null)} className="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-bold hover:bg-gray-300">취소</button>
                              <button onClick={() => handleUpdateEquipment(eq.id)} className="bg-green-500 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-green-600">저장</button>
                            </div>
                          </div>
                        ) : (
                          // 일반 보기 모드일 때
                          <>
                            <div className="flex items-center flex-1">
                              <div 
                                className="relative w-12 h-12 flex items-center justify-center text-3xl bg-gray-50 rounded-lg mr-4 overflow-hidden shrink-0 cursor-pointer group border border-gray-200"
                                onClick={() => setImageModal({ show: true, eqId: eq.id, currentImage: eq.imageUrl || '' })}
                                title="사진/이모지 변경"
                              >
                                {renderIcon(eq.imageUrl, eq.name)}
                                <div className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                  <Camera size={18} className="text-white" />
                                </div>
                              </div>
                              <div className="flex-1">
                                <h4 className="font-bold text-gray-800">{eq.name}</h4>
                                <p className="text-xs text-gray-500 mt-1">총 수량: {eq.totalQuantity}{eq.unit || '개'} {eq.isQuantityTracked ? '' : '(수량고정)'}</p>
                              </div>
                            </div>
                            <div className="flex items-center justify-end gap-1 shrink-0">
                              <button 
                                onClick={() => {
                                  setEditingEqId(eq.id);
                                  setEditEqName(eq.name);
                                  setEditEqQty(eq.totalQuantity);
                                  setEditEqUnit(eq.unit || '개');
                                }}
                                className="text-blue-400 hover:text-blue-600 hover:bg-blue-50 p-2 rounded-lg transition-colors"
                                title="수정"
                              >
                                <Edit2 size={20} />
                              </button>
                              <button 
                                onClick={() => handleDeleteEquipment(eq.id)}
                                className="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-lg transition-colors"
                                title="삭제"
                              >
                                <Trash2 size={20} />
                              </button>
                            </div>
                          </>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* --- ADMIN HISTORY VIEW --- */}
            {view === 'admin_history' && (
              <div className="p-4 md:p-6 space-y-4">
                <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center">
                  <History size={20} className="mr-2" /> 전체 대여/반납 기록
                </h3>
                
                <div className="space-y-3">
                  {[...transactions]
                    .sort((a, b) => b.timestamp - a.timestamp)
                    .map(tx => {
                      const eq = equipments.find(e => e.id === tx.equipmentId);
                      const isReturned = tx.status === 'returned';
                      const dateStr = tx.timestamp ? new Date(tx.timestamp.toDate()).toLocaleString('ko-KR') : '-';
                      const returnStr = tx.returnTimestamp ? new Date(tx.returnTimestamp.toDate()).toLocaleString('ko-KR') : '-';

                      return (
                        <div key={tx.id} className={`p-4 rounded-xl border ${isReturned ? 'bg-gray-50 border-gray-200' : 'bg-white border-green-200 shadow-sm'}`}>
                          <div className="flex justify-between items-start mb-2">
                            <div className="font-bold text-gray-800">
                              {eq?.name || '삭제된 물품'} <span className="text-sm font-normal text-gray-500 ml-1">x {tx.borrowedQuantity}{eq?.unit || '개'}</span>
                            </div>
                            <div className="flex items-center gap-2">
                              <span className={`text-xs font-bold px-2 py-1 rounded ${isReturned ? 'bg-gray-200 text-gray-600' : 'bg-green-100 text-green-700'}`}>
                                {isReturned ? '반납완료' : '대여중'}
                              </span>
                              <button 
                                onClick={() => handleDeleteTransaction(tx.id)}
                                className="text-gray-400 hover:text-red-500 transition-colors p-1 rounded-md hover:bg-red-50"
                                title="기록 삭제"
                              >
                                <Trash2 size={16} />
                              </button>
                            </div>
                          </div>
                          <div className="text-sm text-gray-600 mb-1">
                            <span className="font-medium">대여자:</span> {tx.borrowerName}
                          </div>
                          <div className="text-xs text-gray-400">
                            대여일: {dateStr}
                            {isReturned && <><br/>반납일: {returnStr}</>}
                          </div>
                        </div>
                      );
                  })}
                  {transactions.length === 0 && (
                     <div className="text-center py-10 text-gray-500 bg-white rounded-xl border border-gray-100">
                        기록이 없습니다.
                     </div>
                  )}
                </div>
              </div>
            )}

            {/* --- ADMIN SETTINGS VIEW --- */}
            {view === 'admin_settings' && (
              <div className="p-4 md:p-6">
                <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                  <h3 className="text-lg font-bold text-gray-800 mb-6 flex items-center">
                    <Lock size={20} className="mr-2" /> 관리자 비밀번호 변경
                  </h3>
                  
                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm font-bold text-gray-600 mb-1">새 비밀번호</label>
                      <input 
                        type="password" 
                        value={newPwdInput}
                        onChange={(e) => setNewPwdInput(e.target.value)}
                        className="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 focus:ring-2 focus:ring-green-500 outline-none"
                        placeholder="새 비밀번호 입력"
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-600 mb-1">비밀번호 확인</label>
                      <input 
                        type="password" 
                        value={confirmPwdInput}
                        onChange={(e) => setConfirmPwdInput(e.target.value)}
                        className="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 focus:ring-2 focus:ring-green-500 outline-none"
                        placeholder="새 비밀번호 재입력"
                      />
                    </div>
                    <button 
                      onClick={handleChangePassword}
                      className="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 rounded-xl mt-4 transition-colors"
                    >
                      비밀번호 변경 저장
                    </button>
                  </div>
                </div>
              </div>
            )}

          </main>

          {/* --- CUSTOM MODALS --- */}
          {alertState.show && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4 backdrop-blur-sm">
              <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl text-center">
                <h3 className="text-xl font-bold text-gray-800 mb-2">알림</h3>
                <p className="text-gray-600 mb-6">{alertState.message}</p>
                <button 
                  onClick={() => setAlertState({ show: false, message: '' })}
                  className="w-full bg-green-500 text-white font-bold py-3.5 rounded-xl hover:bg-green-600 active:scale-95 transition-all"
                >
                  확인
                </button>
              </div>
            </div>
          )}

          {confirmState.show && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4 backdrop-blur-sm">
              <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl text-center">
                <h3 className="text-xl font-bold text-gray-800 mb-2">확인</h3>
                <p className="text-gray-600 mb-6">{confirmState.message}</p>
                <div className="flex gap-3">
                  <button 
                    onClick={() => setConfirmState({ show: false, message: '', onConfirm: null })}
                    className="flex-1 bg-gray-200 text-gray-800 font-bold py-3.5 rounded-xl hover:bg-gray-300 active:scale-95 transition-all"
                  >
                    취소
                  </button>
                  <button 
                    onClick={() => {
                      confirmState.onConfirm();
                      setConfirmState({ show: false, message: '', onConfirm: null });
                    }}
                    className="flex-1 bg-red-500 text-white font-bold py-3.5 rounded-xl hover:bg-red-600 active:scale-95 transition-all"
                  >
                    확인
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* --- IMAGE EDIT MODAL --- */}
          {imageModal.show && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4 backdrop-blur-sm">
              <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                <h3 className="text-xl font-bold text-gray-800 mb-4 text-center">사진 / 아이콘 변경</h3>
                
                <div className="flex gap-2 mb-4">
                  <div className="flex-1 relative">
                    <input 
                      type="text" 
                      value={imageModal.currentImage}
                      onChange={(e) => setImageModal(prev => ({ ...prev, currentImage: e.target.value }))}
                      placeholder="이모지 입력 또는 사진 선택"
                      className="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 focus:ring-2 focus:ring-green-500 outline-none"
                    />
                  </div>
                  <label className="cursor-pointer bg-gray-100 hover:bg-gray-200 text-gray-700 flex items-center justify-center px-3 rounded-lg font-medium transition-colors border border-gray-200 shrink-0">
                    <Camera size={20} />
                    <input type="file" accept="image/*" onChange={(e) => handleImageChange(e, (url) => setImageModal(prev => ({ ...prev, currentImage: url })))} className="hidden" />
                  </label>
                </div>

                <div className="mb-4 flex flex-wrap gap-2 justify-center">
                  {['🏀', '⚽', '🏐', '⚾', '🎾', '🏸', '🏓', '🤸', '🎽', '➰', '🥊', '📦'].map(emoji => (
                    <button
                      key={emoji}
                      type="button"
                      onClick={() => setImageModal(prev => ({ ...prev, currentImage: emoji }))}
                      className="w-10 h-10 flex items-center justify-center bg-gray-100 hover:bg-gray-200 rounded-lg text-2xl transition-colors border border-gray-200"
                    >
                      {emoji}
                    </button>
                  ))}
                </div>

                {imageModal.currentImage && imageModal.currentImage.startsWith('data:image') && (
                  <div className="mb-4 w-24 h-24 mx-auto rounded-lg border border-gray-200 overflow-hidden">
                    <img src={imageModal.currentImage} alt="preview" className="w-full h-full object-cover" />
                  </div>
                )}

                <div className="flex gap-3">
                  <button 
                    onClick={() => setImageModal({ show: false, eqId: null, currentImage: '' })}
                    className="flex-1 bg-gray-200 text-gray-800 font-bold py-3.5 rounded-xl hover:bg-gray-300 active:scale-95 transition-all"
                  >
                    취소
                  </button>
                  <button 
                    onClick={async () => {
                      try {
                        setLoading(true);
                        await updateDoc(doc(db, 'equipments', imageModal.eqId), {
                          imageUrl: imageModal.currentImage || '📦'
                        });
                        showToast('사진이 변경되었습니다!');
                        setImageModal({ show: false, eqId: null, currentImage: '' });
                      } catch (error) {
                        console.error(error);
                        showAlert('사진 변경 중 오류가 발생했습니다.');
                      } finally {
                        setLoading(false);
                      }
                    }}
                    className="flex-1 bg-green-500 text-white font-bold py-3.5 rounded-xl hover:bg-green-600 active:scale-95 transition-all"
                  >
                    저장
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* --- TOAST MESSAGE --- */}
          {toastMsg && (
            <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 transition-all duration-300">
              <div className="bg-gray-800/90 backdrop-blur-sm text-white px-6 py-3 rounded-full shadow-2xl font-bold flex items-center">
                <Check size={18} className="mr-2 text-green-400" strokeWidth={3} />
                {toastMsg}
              </div>
            </div>
          )}

        </div>
      );
    }

    // React 애플리케이션 렌더링
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
